name: Deploy to Cloudflare

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2.0.3
        with:
          terraform_version: 1.6.4

      - name: Use Node.js 18.x
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'

      # Automatically get an account id via the API Token
      # if secrets.CLOUDFLARE_ACCOUNT_ID is not set.
      - name: Fetch Account ID
        id: fetch_account_id
        run: |
          if [[ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]]; then
            ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
            echo "Using provided CLOUDFLARE_ACCOUNT_ID from secrets."
          else
            ACCOUNT_ID=$(curl -X GET "https://api.cloudflare.com/client/v4/accounts" -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type:application/json" | jq ".result[0].id" -r)
            if [[ "$ACCOUNT_ID" == "null" ]]; then
              echo "Failed to get an account id, please make sure you have set up CLOUDFLARE_API_TOKEN correctly!"
              exit 1
            fi
          fi
          echo 'account_id='$ACCOUNT_ID >> $GITHUB_OUTPUT

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      # This is a temporary workaround to fix issue #13
      # On a new Cloudflare account, the terraform apply will fail with `workers.api.error.subdomain_required`
      # This may be due to the account not having a worker subdomain yet, so we create a dummy worker and then delete it.
      # Cloudflare should allocate a worker subdomain after this.
      # https://github.com/cloudflare/terraform-provider-cloudflare/issues/3304
      - name: Create worker subdomain
        id: create_dummy_worker
        run: |
          curl --request PUT --fail-with-body \
               --url https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/dummy-ib4db6ntj5csdef3 \
               --header 'Authorization: Bearer '$CLOUDFLARE_API_TOKEN \
               --header 'Content-Type: application/javascript' \
               --data 'addEventListener('\''fetch'\'', (event) => event.respondWith(new Response('\''OK'\'')))'\
          
          curl --request DELETE --fail-with-body \
               --url https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/dummy-ib4db6ntj5csdef3 \
               --header 'Authorization: Bearer '$CLOUDFLARE_API_TOKEN \
               --header 'Content-Type: application/json'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.fetch_account_id.outputs.account_id }}

      - name: Install packages
        run: |
          npm install
          cd worker
          npm install

      - name: Build worker
        run: |
          cd worker
          npx wrangler deploy src/index.ts --outdir dist --dry-run

      - name: Build page
        run: |
          npx @cloudflare/next-on-pages

 # 1. 既然 Terraform 健忘又殘缺，我們只用它初始化，完全不讓它執行 apply
 # 1. 初始化 Terraform，但我們完全不管它的 apply 報錯
      - name: Terraform Init
        run: terraform init

      # 2. 強制部署 Pages，並直接透過雲端 API 強灌相容性與 KV 綁定
      - name: Force Fix and Deploy Pages
        run: |
          # A. 確保專案存在
          npx wrangler pages project create uptimeflare --production-branch main || echo "Already exists"
          
          # B. 透過官方 API 精準撈取您後台 uptimeflare_kv 的 32 位元真實 ID
          echo "正在從雲端獲取實體 KV ID..."
          KV_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" | jq -r '.result[] | select(.title == "uptimeflare_kv") | .id')
          
          if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
            echo "⚠️ 警告：找不到名為 uptimeflare_kv 的 KV 空間，請確認後台名稱是否正確！"
          else
            echo "🎯 成功取得實體 KV ID: $KV_ID"
            echo "正在透過 Cloudflare 官方最高權限 API 強行注入配置..."
            
            # 直接繞過 Wrangler 檔案讀取，直擊 Cloudflare 最底層資料庫，把「相容性」與「KV」綁死
            curl --request PATCH \
              --url "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/uptimeflare" \
              --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              --header "Content-Type: application/json" \
              --data "{
                \"deployment_configs\": {
                  \"production\": {
                    \"compatibility_date\": \"2023-11-08\",
                    \"compatibility_flags\": [\"nodejs_compat\"],
                    \"kv_namespaces\": {
                      \"UPTIMEFLARE_STATE\": { \"namespace_id\": \"$KV_ID\" }
                    }
                  }
                }
              }"
          fi
          
          # C. 暫時將可能干擾的 wrangler.toml 改名
          if [ -f "wrangler.toml" ]; then mv wrangler.toml wrangler.toml.bak; fi
          if [ -f "worker/wrangler.toml" ]; then mv worker/wrangler.toml worker/wrangler.toml.bak; fi
          
          # D. 純粹、乾淨地上傳靜態網頁檔案
          echo "正在上傳前端網頁檔案..."
          npx wrangler pages deploy .vercel/output/static --project-name uptimeflare
          
          # E. 部署完後將檔案還原
          if [ -f "wrangler.toml.bak" ]; then mv wrangler.toml.bak wrangler.toml; fi
          if [ -f "worker/wrangler.toml.bak" ]; then mv worker/wrangler.toml.bak worker/wrangler.toml; fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.fetch_account_id.outputs.account_id }}

      # 3. 獨立更新後端的 Worker，這步跟前端完全隔離，絕不撞車
      - name: Force Sync Worker Backend
        run: |
          # 還原剛才改名的 toml 檔以利 Worker 讀取
          if [ -f "worker/wrangler.toml.bak" ]; then mv worker/wrangler.toml.bak worker/wrangler.toml; fi
          
          echo "正在單獨同步後端 Worker 監控程式碼..."
          cd worker
          npx wrangler deploy --name uptimeflare_worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.fetch_account_id.outputs.account_id }}